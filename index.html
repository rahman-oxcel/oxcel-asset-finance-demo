<style>
html,body{height:100%}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',Arial,Helvetica,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#001732;color:#fff;padding:20px}
.gate{width:100%;max-width:380px;text-align:center}
.gate img{width:190px;height:auto;margin:0 auto 26px;display:block}
.gate p{color:rgba(255,255,255,.6);font-size:13.5px;margin-bottom:22px}
.gate form{display:flex;flex-direction:column;gap:10px}
.gate input{width:100%;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.06);color:#fff;border-radius:8px;padding:12px 14px;font-size:15px;outline:none;text-align:center}
.gate input:focus{border-color:#fff}
.gate button{background:#fff;color:#001732;border:none;border-radius:8px;padding:12px 14px;font-size:14px;font-weight:600;cursor:pointer}
.gate button:disabled{opacity:.6;cursor:default}
.err{color:#F3B4B4;font-size:12.5px;min-height:16px;margin-top:2px}
.foot{margin-top:22px;font-size:11px;color:rgba(255,255,255,.35)}
iframe#app{position:fixed;inset:0;width:100%;height:100%;border:0}
</style></head>

const b2u=b=>Uint8Array.from(atob(b),c=>c.charCodeAt(0));
async function unlock(pw){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2u(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2u(IV)},key,b2u(DATA));
  return new TextDecoder().decode(pt);
}
const f=document.getElementById('f'),pw=document.getElementById('pw'),err=document.getElementById('err'),go=document.getElementById('go');
async function attempt(p){
  err.textContent='';go.disabled=true;go.textContent='Unlocking…';
  try{
    const html=await unlock(p);
    try{sessionStorage.setItem('oxpw',p);}catch(e){}
    const fr=document.createElement('iframe');fr.id='app';fr.title='Oxcel Broker Services';fr.srcdoc=html;
    document.body.innerHTML='';document.body.style.display='block';document.body.appendChild(fr);
  }catch(e){
    go.disabled=false;go.textContent='Unlock preview';
    err.textContent='Incorrect password. Please try again.';pw.value='';pw.focus();
  }
}
f.addEventListener('submit',e=>{e.preventDefault();if(pw.value)attempt(pw.value);});
try{const saved=sessionStorage.getItem('oxpw');if(saved)attempt(saved);}catch(e){}
